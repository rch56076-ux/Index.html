<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Touch: Quest - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.3; }
        canvas { position: absolute; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; pointer-events: none; }
        .stat { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 30px; text-align: center; display: none; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; border: 3px solid #ff3366; z-index: 10; width: 80%; }
        #btn-start { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 15px 50px; font-size: 22px; background: #00f2ff; color: #000; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00f2ff; z-index: 11; }
    </style>
</head>
<body>

<div id="game-container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="ui-layer">
        <div class="stat">Level: <span id="lvl">1</span></div>
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat" id="timer-div" style="display:none;">Time: <span id="time">30</span>s</div>
    </div>

    <div id="msg"></div>
    <button id="btn-start">START QUEST</button>
</div>

<script>
// --- Audio System ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(freq, type, duration) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const btnStart = document.getElementById('btn-start');
const msgBox = document.getElementById('msg');

let score = 0, level = 1, timeLeft = 30;
let isPlaying = false, isDragging = false, timerInterval;
let cursor = { x: 0, y: 0 }, diamond = { x: 100, y: 100, r: 20 };
let goal = { x: 0, y: 0, r: 50 }, bombs = [];

function initLevel() {
    diamond.x = 100; diamond.y = 100;
    goal.x = canvasElement.width - 100;
    goal.y = canvasElement.height - 100;
    bombs = [];
    let bombCount = level >= 5 ? (level - 3) : 0; 
    for(let i=0; i<bombCount; i++) {
        bombs.push({
            x: Math.random() * (canvasElement.width - 200) + 100,
            y: Math.random() * (canvasElement.height - 200) + 100,
            vx: (Math.random() - 0.5) * (level + 2),
            vy: (Math.random() - 0.5) * (level + 2)
        });
    }
}

function onResults(results) {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        cursor.x = (1 - hand[8].x) * canvasElement.width;
        cursor.y = hand[8].y * canvasElement.height;

        const dist = Math.sqrt((hand[8].x - hand[4].x)**2 + (hand[8].y - hand[4].y)**2);
        if (dist < 0.05) {
            if (Math.sqrt((cursor.x - diamond.x)**2 + (cursor.y - diamond.y)**2) < 60) {
                if(!isDragging) playSFX(500, 'sine', 0.1);
                isDragging = true;
            }
        } else { isDragging = false; }

        if (isDragging) { diamond.x = cursor.x; diamond.y = cursor.y; }
    }

    if (isPlaying) {
        // Goal circle
        canvasCtx.beginPath();
        canvasCtx.arc(goal.x, goal.y, goal.r, 0, 2 * Math.PI);
        canvasCtx.strokeStyle = '#ff3366';
        canvasCtx.lineWidth = 3;
        canvasCtx.stroke();

        // Check Goal
        if (Math.sqrt((diamond.x - goal.x)**2 + (diamond.y - goal.y)**2) < goal.r) {
            score += 10; document.getElementById('score').innerText = score;
            playSFX(900, 'square', 0.2);
            level++; document.getElementById('lvl').innerText = level;
            if(level === 5) { document.getElementById('timer-div').style.display = 'block'; startTimer(); }
            isDragging = false; initLevel();
        }

        // Bombs & Collision
        bombs.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            if(b.x < 0 || b.x > canvasElement.width) b.vx *= -1;
            if(b.y < 0 || b.y > canvasElement.height) b.vy *= -1;
            canvasCtx.font = "35px Arial";
            canvasCtx.fillText("💣", b.x - 15, b.y + 15);
            if(Math.sqrt((diamond.x - b.x)**2 + (diamond.y - b.y)**2) < 45) {
                gameOver("BOOM! Bomb Takraya! 💥");
            }
        });

        // Diamond & Cursor
        canvasCtx.fillStyle = "#00f2ff";
        canvasCtx.beginPath();
        canvasCtx.arc(diamond.x, diamond.y, 15, 0, 2*Math.PI);
        canvasCtx.fill();
        canvasCtx.beginPath();
        canvasCtx.arc(cursor.x, cursor.y, 10, 0, 2*Math.PI);
        canvasCtx.strokeStyle = "white";
        canvasCtx.stroke();
    }
    canvasCtx.restore();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 30;
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('time').innerText = timeLeft;
        if(timeLeft <= 0) gameOver("TIME UP! ⏰");
    }, 1000);
}

function gameOver(reason) {
    isPlaying = false; clearInterval(timerInterval);
    playSFX(100, 'sawtooth', 0.5);
    msgBox.innerHTML = reason + "<br>Score: " + score;
    msgBox.style.display = 'block';
    btnStart.style.display = 'block';
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
hands.onResults(onResults);
const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
camera.start();

btnStart.onclick = () => {
    audioCtx.resume();
    score = 0; level = 1; isPlaying = true;
    msgBox.style.display = 'none';
    btnStart.style.display = 'none';
    initLevel();
};
</script>
</body>
</html>
